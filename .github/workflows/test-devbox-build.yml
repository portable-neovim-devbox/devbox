name: Test devbox build

on:
  pull_request:

jobs:
  build:
    runs-on: ubuntu-latest
    strategy:
      fail-fast: false
      matrix:
        include:
          - neovim_version: stable
            proxy: none
          - neovim_version: stable
            proxy: dummy
          - neovim_version: v0.10.4
            proxy: none
          - neovim_version: stable
            proxy: none
            lang: ja_JP.UTF-8
          - neovim_version: stable
            proxy: none
            lang: zh_CN.UTF-8
          - neovim_version: stable
            proxy: none
            lang: ko_KR.UTF-8
          - neovim_version: stable
            proxy: none
            lang: de_DE.UTF-8
          - neovim_version: stable
            proxy: none
            user_name: devuser123
          - neovim_version: stable
            proxy: none
            expected_lang: en_US.UTF-8
          - neovim_version: stable
            proxy: none
            expected_lang: ja_JP.UTF-8
          - neovim_version: stable
            proxy: none
            user_id: 1000

    steps:
      - uses: actions/checkout@v6

      - name: Make scripts executable
        run: chmod +x tests/devbox-build/run_smoke_tests.sh tests/devbox-build/proxy/setup_proxy.sh

      - name: Get runner UID
        run: echo "RUNNER_UID=$(id -u)" >> $GITHUB_ENV

      - name: Setup dummy proxy
        if: matrix.proxy == 'dummy'
        run: bash tests/devbox-build/proxy/setup_proxy.sh

      - name: Write .env
        env:
          NEOVIM_VERSION: ${{ matrix.neovim_version }}
          USER_NAME: ${{ matrix.user_name || 'user' }}
          LANG_VAL: ${{ matrix.lang }}
        run: |
          {
            echo "NEOVIM_VERSION=${NEOVIM_VERSION}"
            echo "USER_NAME=${USER_NAME}"
            echo "LANG=${LANG_VAL}"
            echo "HTTP_PROXY=${PROXY_ADDR:-}"
            echo "HTTPS_PROXY=${PROXY_ADDR:-}"
            echo "NO_PROXY=localhost,127.0.0.1,*.docker.io"
          } > .env

      - name: Build image
        run: docker compose build

      - name: Create storage container
        run: docker compose create devbox-storage

      - name: Create project directory
        run: mkdir -p /tmp/test-project

      - name: Set project directory ownership
        if: matrix.user_id != ''
        run: sudo chown ${{ matrix.user_id }} /tmp/test-project

      - name: Run smoke tests
        env:
          EXPECTED_NEOVIM: ${{ matrix.neovim_version }}
          EXPECTED_USER: ${{ matrix.user_name || 'user' }}
          EXPECTED_LANG: ${{ matrix.expected_lang }}
          EXPECTED_USER_ID: ${{ matrix.user_id || env.RUNNER_UID }}
          LANG: ${{ matrix.expected_lang }}
          USER_ID: ${{ matrix.user_id || env.RUNNER_UID }}
        run: |
          docker run --rm \
            -e USER_ID \
            -e LANG \
            --volumes-from devbox-storage-master \
            -v "$(pwd)/tests/devbox-build/run_smoke_tests.sh:/tmp/run_smoke_tests.sh:ro" \
            -v "/tmp/test-project:/home/${EXPECTED_USER}/project" \
            devbox:latest \
            /tmp/run_smoke_tests.sh "${EXPECTED_NEOVIM}" "${EXPECTED_USER}" "${EXPECTED_LANG}" "${EXPECTED_USER_ID}"
